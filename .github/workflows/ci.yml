name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release-check:
    name: Release check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run release checks
        env:
          CHANGELOG_CHECK_MESSAGE: ${{ github.event.pull_request.body }}
        run: scripts/release-check
